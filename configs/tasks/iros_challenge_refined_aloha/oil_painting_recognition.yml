demonstration_configs:
- domain_randomization: &id003
    cameras:
      config_path: configs/cameras/fixed_camera_aloha_refined.yml
      type: fixed
    random_environment:
      has_wall: false
      hdr: false
      robot_base_position: false
      robot_eepose: false
      table_texture: false
      table_type: false
      wall_texture: false
    rewrite_instruction: false
  generation_config: &id004
    action_path:
      mode: auto
      robot: 0
    articulation: []
    randomization_hack_flag: true
    goal:
    - - - obj1_uid:
          - brush
          obj2_uid:
          - paint1
          position:
          - top
          fixed_position: true
          force_fixed_grasp: true
          fixed_grasp_config: &id001
            translation:
            - 0.0
            - 0.0
            - 0.0
            orientation:
            - 0.0
            - 1.0
            - 0.0
            - 0.0
          allow_fixed_grasp: true
          arm: left
    - - - obj1_uid:
          - brush
          obj2_uid:
          - paint2
          position:
          - top
          fixed_position: true
          force_fixed_grasp: true
          fixed_grasp_config: *id001
          allow_fixed_grasp: true
          arm: right
    mode: manual
    planner: curobo
  instruction: put the box in the basket.
  layout_config: &id005
    ignored_objects: []
    custom_tableset:
      paint1:
        pos_x: -0.1
        pos_y: 0.3
        additional_height: 0.0
        random_range_angle: 0
        reset_orientation: true
        orientation:
        - 0.5
        - 0.5
        - -0.5
        - -0.5
        type: fixed_global_range
      paint2:
        pos_x: -0.1
        pos_y: -0.3
        additional_height: 0.0
        random_range_angle: 0
        reset_orientation: true
        orientation:
        - 0.5
        - 0.5
        - -0.5
        - -0.5
        type: fixed_global_range
    type: random_custom_tableset
  mode: manual
  num_episode: 500
  object_config: &id006
    brush:
      type: existed_object
      uid_list:
      - brush_pen
      without_colliders: true
      is_not_rigid: true
    paint1: &id002
      type: load_object_from_path
      filter_rule: []
      max_cached_num: 20
      path: scene_usds/IROS_scenes_aloha_final/scene_paint/paints
      fixed_scale: 1.0
      option:
      - plain_replace
      without_colliders: true
      is_not_rigid: true
    paint2: *id002
  preprocess_config: []
  robots:
  - &id007
    type: manip/mobile_aloha/piper
  table_uid: instance_01
  task_name: IROS_C_V5_Aloha/brush_paint
  usd_name: scene_usds/IROS_scenes_aloha_final/scene_paint/base
evaluation_configs:
- domain_randomization: *id003
  generation_config: *id004
  instruction: put the box in the basket.
  layout_config: *id005
  mode: manual
  num_test: 20
