demonstration_configs:
- domain_randomization: &id001
    cameras:
      config_path: configs/cameras/fixed_camera_lift2_simbox.yml
      type: fixed
    random_environment:
      has_wall: false
      hdr: false
      robot_base_position: false
      robot_eepose: false
      table_texture: false
      table_type: false
      wall_texture: false
    rewrite_instruction: false
  generation_config: &id002
    action_path:
      mode: auto
      robot: 0
    articulation: []
    goal:
    - - obj1_uid:
        - '0'
        obj2_uid:
        - '1'
        position:
        - top
        fixed_position: true
        allow_fixed_grasp: true    # comment to use any grasp 
        force_fixed_grasp: true
        arm: auto
        grasp_idx: [0, 1, 2, 3, 4]
        base_motion_list:
          0:
            - x: null
              y: [-0.05, 0.05]
              yaw: null
              type: align
            - x: 0.2
              y: 0.0
              yaw: 0.0
              type: delta
          3:
            - x: null
              y: [-0.05, 0.05]
              yaw: null
              type: align
    mode: manual
    planner: curobo
  instruction: Pick up the apple from the dining table and place it into the fruit bowl.    # update instruction
  layout_config: &id003
    type: random_custom_tableset
    in_order: true
    custom_tableset:
      # '0':
      #   type: centric_range
      #   angle_bilateral: true
      #   angle: 15
      #   w: 0.06
      #   h: 0.06
      #   buffer_size: 0.0
      '0':
        random_range_x: -0.4
        random_range_y: -0.5
        random_range_w: 0.2
        random_range_h: 0.4
        random_range_angle: 15
        additional_height: 0.01
        buffer_size: 0.01
        type: global_range
      # '1':
      #   type: centric_range
      #   angle_bilateral: true
      #   angle: 15
      #   w: 0.06
      #   h: 0.06
      #   buffer_size: 0.0
      '1':
        random_range_x: -0.4
        random_range_y: -0.1
        random_range_w: 0.4
        random_range_h: 0.6
        random_range_angle: 0
        additional_height: 0.01
        buffer_size: 0.0
        type: global_range
      '2':
        type: centric_range
        angle_bilateral: true
        angle: 35
        w: 0.1
        h: 0.1
        buffer_size: 0.01
        skip_on_table_check: true
      '3':
        type: centric_range
        angle_bilateral: true
        angle: 35
        w: 0.1
        h: 0.1
        buffer_size: 0.01
        skip_on_table_check: true
      '4':
        type: centric_range
        angle_bilateral: true
        angle: 35
        w: 0.1
        h: 0.1
        buffer_size: 0.01
        skip_on_table_check: true
      '5':
        type: centric_range
        angle_bilateral: true
        angle: 35
        w: 0.1
        h: 0.1
        buffer_size: 0.01
        skip_on_table_check: true
  mode: manual
  num_episode: 400
  object_config: &id004
    # '0':
    #   type: existed_object
    #   uid_list:
    #   - 5b293348
    '0':
      type: load_object_from_path
      filter_rule: []
      max_cached_num: 10
      path: "regex:^object_usds/custom_usd/ebench_usds/apple/ready/.*\\.usd$"
      relative_scale: 0.8
      option:
      - plain_replace
      without_colliders: false
    # '1':
    #   type: existed_object
    #   uid_list:
    #   - 5bffab7e
    '1':
      type: load_object_from_path
      filter_rule: []
      max_cached_num: 10
      path: "regex:^object_usds/custom_usd/ebench_usds/bowl/ready/.*\\.usd$"
      relative_scale: 0.8
      option:
      - plain_replace
      without_colliders: false
    '2':
      type: existed_object
      uid_list:
      - 5c800314
    '3':
      type: existed_object
      uid_list:
      - 7b1211cd
    '4':
      type: existed_object
      uid_list:
      - afe4ab6d
    '5':
      type: existed_object
      uid_list:
      - 6bd45f5d
  preprocess_config:
  - config:
      config: default
      type: convexDecomposition
    type: collider
  - type: rigid_body
  robots:
  - &id006
    type: manip/lift2/R5a
    position: [-0.9, 0.1, -0.5]  # update to fit the scene
    # orientation: [0, 0, 180]
  # update following
  table_uid: table
  task_name: ebench/mobile_manip/apple_to_fruit_bowl
  usd_name: scene_usds/ebench/simple_pnp/task4/scene
  env_vars:
    MDL_SYSTEM_PATH: "/isaac-sim/materials/:{ASSETS_DIR}/miscs/mdl/ebench/mdl:{ASSETS_DIR}/scene_usds/ebench/simple_pnp/task3/SubUSDs/materials"

evaluation_configs:
- domain_randomization: *id001
  num_test: 5
  num_steps: 1000
  robots:
  - *id006
  table_uid: table
  task_name: ebench/mobile_manip/apple_to_fruit_bowl_val_train
  usd_name: scene_usds/ebench/simple_pnp/task4/scene
  env_vars:
    MDL_SYSTEM_PATH: "/isaac-sim/materials/:{ASSETS_DIR}/miscs/mdl/ebench/mdl:{ASSETS_DIR}/scene_usds/ebench/simple_pnp/task3/SubUSDs/materials"
