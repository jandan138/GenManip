  instruction: Pick up the salt from the countertop and place it into the spice rack.    # update instruction
  layout_config: &id003
    type: random_custom_tableset
    in_order: true
    custom_tableset:
      '0':
        random_range_x: 0.29
        random_range_y: -1.3
        random_range_w: 0.1
        random_range_h: 0.2
        random_range_angle: 15
        additional_height: 0.01
        reset_orientation: true
        orientation: [0.7, 0.0, 0.0, 0.7]
        buffer_size: 0.01
        type: global_range
      # '1':
      #   type: centric_range
      #   angle_bilateral: true
      #   angle: 15
      #   w: 0.1
      #   h: 0.1
      #   buffer_size: 0.01
      # '2':
