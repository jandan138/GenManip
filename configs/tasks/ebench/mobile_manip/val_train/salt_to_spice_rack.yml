      #   angle_bilateral: true
      #   angle: 15
      #   w: 0.1
      #   h: 0.1
      #   buffer_size: 0.01
  mode: manual
  num_episode: 400
  object_config: &id004
    '0':
      type: load_object_from_path
      filter_rule: []
      max_cached_num: 10
      path: "regex:^object_usds/custom_usd/ebench_usds/salt_new/GRScenes_assets/bottle/.*\\.usd$"
      relative_scale: 0.008
      option:
      - plain_replace
      without_colliders: false
    '1':
      type: existed_object
      uid_list:
      - '_06'    # update uid
    # '2':
    #   type: existed_object
    #   uid_list:
    #   - '_05'    # update uid
  preprocess_config:
  - &id005
    config:
      config: default
      type: convexDecomposition
    type: collider
  # - type: rigid_body
  robots:
  - &id006
    type: manip/lift2/R5a
    position: [0.9, -0.99, -0.5]  # update to fit the scene
    orientation: [0, 0, 0, 1]
  # update following
  table_uid: table
  task_name: ebench/mobile_manip/salt_to_spice_rack
  usd_name: scene_usds/ebench/simple_pnp/task7/scene
  env_vars:
    MDL_SYSTEM_PATH: "/isaac-sim/materials/:{ASSETS_DIR}/miscs/mdl/ebench/mdl:{ASSETS_DIR}/scene_usds/ebench/simple_pnp/task3/SubUSDs/materials"

