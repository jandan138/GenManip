demonstration_configs:
- domain_randomization: &id001
    cameras:
      config_path: configs/cameras/fixed_camera_lift2_simbox.yml
      type: fixed
    random_environment:
      has_wall: false
      hdr: false
      robot_base_position: false
      robot_eepose: false
      table_texture: false
      table_type: false
      wall_texture: false
    rewrite_instruction: false
  generation_config: &id002
    action_path:
      mode: manual
      actions:
      - type: pick_and_place
        obj1_uid:
        - '0'
        obj2_uid:
        - '1'
        position:
        - top
        allow_fixed_grasp: true    # comment to use any grasp 
        force_fixed_grasp: true
        # place position
        fixed_position: true
        fixed_position_config:     # apply delta to the final object position to be placed
          - translation: [-0.00155, 0.06608, -0.07523236]
            orientation: [1, 0, 0, 0]
          - translation: [-0.01312671, -0.05062755, -0.05525166] # top mid
            orientation: [1, 0, 0, 0]
          - translation: [ 0.10248329, 0.02695245, -0.05525166]     # top corner
            orientation: [1, 0, 0, 0]
          - translation: [-0.12582671, -0.01152755, -0.05525166]
            orientation: [1, 0, 0, 0]
        arm: auto
        grasp_idx: [0, 1, 2, 3, 4]
        motion_config:
          post_grasp_distance: 0.30
          # place_distance: -0.10
        base_motion_list:
          0:
            - x: null
              y: [-0.05, 0.05]
              yaw: null
              type: align
            - x: 0.2
              y: 0.0
              yaw: 0.0
              type: delta
          3:
            - x: null
              y: [-0.05, 0.05]
              yaw: null
              type: align
      robot: 0
    articulation: []
    goal:
      - - - obj1_uid:
            - '0'
            obj2_uid:
            - '1'
            position:
            - top

      - - - type: manip/default/sr_based_genmanip_range
            obj1_uid: "0"
            x_type: none
            y_type: none
            z_type: absolute
            z_range: [0.0, 0.08]

    mode: manual
    planner: curobo
  instruction: Pick up the perfume from the vanity table and place it into the cosmetics rack.   # update instruction
  layout_config: &id003
    type: random_custom_tableset
    in_order: true
    custom_tableset:
      # '0':
      #   type: centric_range
      #   angle_bilateral: true
      #   angle: 15
      #   w: 0.1
      #   h: 0.1
      #   buffer_size: 0.0
      '0':
        random_range_x: -0.2
        random_range_y: -0.1
        random_range_w: 0.1
        random_range_h: 0.2
        random_range_angle: 15
        additional_height: 0.01
        buffer_size: 0.01
        type: global_range
      '1':
        type: centric_range
        angle_bilateral: true
        angle: 0
        w: 0.1
        h: 0.1
        buffer_size: 0.0
      '2':
        type: centric_range
        angle_bilateral: true
        angle: 15
        w: 0.1
        h: 0.1
        buffer_size: 0.0
      '3':
        type: centric_range
        angle_bilateral: true
        angle: 15
        w: 0.1
        h: 0.1
        buffer_size: 0.0
      '4':
        type: centric_range
        angle_bilateral: true
        angle: 15
        w: 0.1
        h: 0.1
        buffer_size: 0.0
      '5':
        type: centric_range
        angle_bilateral: true
        angle: 15
        w: 0.1
        h: 0.1
        buffer_size: 0.0
  mode: manual
  num_episode: 40
  object_config: &id004
    # '0':
    #   type: existed_object
    #   uid_list:
    #   - '00'    # update uid
    '0':
      type: load_object_from_path
      filter_rule: []
      max_cached_num: 10
      path: "regex:^object_usds/custom_usd/ebench_usds/perfume_bottle/ready/.*\\.usd$"
      relative_scale: 0.3
      option:
      - plain_replace
      without_colliders: false
    '1':
      type: existed_object
      uid_list:
      - '_01'    # update uid
    '2':
      type: existed_object
      uid_list:
      - '_04'    # update uid
    '3':
      type: existed_object
      uid_list:
      - '_07'    # update uid
    '4':
      type: existed_object
      uid_list:
      - '_05'    # update uid
    '5':
      type: existed_object
      uid_list:
      - '_03'    # update uid
  preprocess_config: []
  robots:
  - &id006
    type: manip/lift2/R5a
    position: [-0.90, -0.23, -0.4]  # update to fit the scene
    # orientation: [0, 0, 180]
  # update following
  table_uid: table
  task_name: ebench/mobile_manip/perfume_to_cosmetics_rack
  usd_name: scene_usds/ebench/simple_pnp/task6/scene
  env_vars:
    MDL_SYSTEM_PATH: "/isaac-sim/materials/:{ASSETS_DIR}/miscs/mdl/ebench/mdl:{ASSETS_DIR}/scene_usds/ebench/simple_pnp/task3/SubUSDs/materials"


evaluation_configs:
- domain_randomization: *id001
  num_test: 60
  num_steps: 1000
  robots:
  - *id006
  table_uid: table
  task_name: ebench/mobile_manip/perfume_to_cosmetics_rack
  usd_name: scene_usds/ebench/simple_pnp/task6/scene
  env_vars:
    MDL_SYSTEM_PATH: "/isaac-sim/materials/:{ASSETS_DIR}/miscs/mdl/ebench/mdl:{ASSETS_DIR}/scene_usds/ebench/simple_pnp/task3/SubUSDs/materials"
