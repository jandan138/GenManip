      type: load_object_from_path
    obj2:
      clip_range:
        max: 0.45
        min: 0.2
      filter_rule:
      - is_container
      max_cached_num: 10
      option:
      - force_top
      path: object_usds/objaverse_usd
      type: load_object_from_path
  preprocess_config:
  - config:
      type: ccd
    type: ccd
  - config:
      config: default
      type: convexDecomposition
    type: collider
  robots:
