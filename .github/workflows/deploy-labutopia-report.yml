name: Deploy LabUtopia Report

# GenManip LabUtopia reports are zero-build static HTML under docs/.
# This mirrors the EOS learning-site deployment style: upload docs/ as the Pages artifact.

on:
  workflow_dispatch:
  push:
    branches:
      - labutopia-ebench-poc
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-labutopia-report.yml"

permissions:
  contents: read

concurrency:
  group: labutopia-report-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
